<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MOB Record RUN Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div>TIME <span id="timeText">0.00</span></div>
      <div>SPEED <span id="speedText">0</span></div>
      <div>RANK <span id="rankText">1/8</span></div>
      <div id="miniMap">
        <div id="miniTrack"></div>
        <div id="miniPlayer"></div>
      </div>
    </div>

    <div id="controls">
      <button id="accelBtn">アクセル</button>
      <button id="jumpBtn">ジャンプ</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
